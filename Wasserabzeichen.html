<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wasseraufbau – Variante III</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500&display=swap');
  :root {
    --rot:#C0392B; --anthrazit:#1a1c1e; --grau:#2d3035; --linie:#3d4045;
    --blau:#2471a3; --gruen:#1e8449; --orange:#e67e22; --lila:#8e44ad;
    --tuerkis:#16a085; --weiss:#ffffff; --gelb:#f1c40f;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    background:var(--anthrazit);
    color:var(--weiss);
    font-family:'Barlow',sans-serif;
    font-size:14px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  /* START */
  #start-screen {
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:32px 24px;
    text-align:center;
  }
  .start-badge {
    font-family:'DM Mono',monospace;
    font-size:11px;
    letter-spacing:.15em;
    color:var(--rot);
    text-transform:uppercase;
    margin-bottom:10px;
  }
  .start-title {
    font-family:'Barlow Condensed',sans-serif;
    font-size:48px;
    font-weight:800;
    line-height:1;
    text-transform:uppercase;
    margin-bottom:6px;
  }
  .start-title span { color:var(--rot); }
  .start-sub {
    font-family:'DM Mono',monospace;
    font-size:12px;
    color:#666;
    margin-bottom:12px;
  }
  .hero-bar {
    width:100%;
    max-width:305px;
    height:38px;
    background:#000;
    margin:0 auto 28px;
  }
  .start-question {
    font-family:'Barlow Condensed',sans-serif;
    font-size:20px;
    font-weight:600;
    letter-spacing:.05em;
    color:#aaa;
    text-transform:uppercase;
    margin-bottom:24px;
  }
  .role-grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
    max-width:480px;
    width:100%;
  }
  .role-btn {
    border:none;
    border-radius:8px;
    padding:20px 12px;
    cursor:pointer;
    transition:transform .15s, box-shadow .15s;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    font-family:'Barlow Condensed',sans-serif;
    text-transform:uppercase;
    letter-spacing:.05em;
    color:#fff;
  }
  .role-btn:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,.4); }
  .role-btn:active { transform:translateY(0); }
  .role-btn .icon { font-size:28px; }
  .role-btn .name { font-size:16px; font-weight:700; }
  .role-btn .sub { font-size:11px; opacity:.75; font-weight:400; font-family:'Barlow',sans-serif; }
  .btn-gf { background:linear-gradient(135deg,#1a3a5c,#2471a3); }
  .btn-at { background:linear-gradient(135deg,#6e1010,#C0392B); }
  .btn-wt { background:linear-gradient(135deg,#1a3a5c,#2471a3); }
  .btn-st { background:linear-gradient(135deg,#7a4010,#e67e22); }
  .btn-ma { background:linear-gradient(135deg,#4a1a6e,#8e44ad); }
  .btn-me { background:linear-gradient(135deg,#0a3830,#16a085); }
  .role-all-btn {
    grid-column:1/-1;
    background:linear-gradient(135deg,#333,#555);
    border-radius:8px;
    padding:14px;
    cursor:pointer;
    border:none;
    color:#fff;
    font-family:'Barlow Condensed',sans-serif;
    font-size:16px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.08em;
    transition:transform .15s;
  }
  .role-all-btn:hover { transform:translateY(-2px); }

  /* MAIN */
  #main-screen { display:none; flex-direction:column; min-height:100vh; }
  .topbar {
    position:sticky;
    top:0;
    z-index:100;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:12px 20px;
    background:#111315;
    border-bottom:1px solid var(--linie);
    gap:12px;
  }
  .topbar-left { display:flex; align-items:center; gap:12px; }
  .back-btn {
    background:none;
    border:1px solid #444;
    color:#aaa;
    padding:6px 12px;
    border-radius:5px;
    cursor:pointer;
    font-family:'DM Mono',monospace;
    font-size:11px;
    letter-spacing:.05em;
    transition:border-color .15s, color .15s;
  }
  .back-btn:hover { border-color:#888; color:#fff; }
  .current-role-tag {
    font-family:'Barlow Condensed',sans-serif;
    font-size:15px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.08em;
    padding:5px 14px;
    border-radius:5px;
    color:#fff;
  }
  .topbar-title {
    font-family:'Barlow Condensed',sans-serif;
    font-size:18px;
    font-weight:700;
    text-transform:uppercase;
    color:#aaa;
    letter-spacing:.05em;
  }
  .topbar-right {
    font-family:'DM Mono',monospace;
    font-size:10px;
    color:#555;
    text-align:right;
    line-height:1.4;
  }
  .content {
    padding:20px 20px 60px;
    max-width:720px;
    margin:0 auto;
    width:100%;
  }

  .phase { margin-bottom:8px; }
  .phase-header {
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 14px;
    background:#222428;
    border-radius:6px;
    border-left:4px solid #2a2d32;
    cursor:default;
    user-select:none;
    transition:background .15s;
  }
  .phase-header.has-content { border-left-color:var(--rot); cursor:pointer; }
  .phase-header.has-content:hover { background:#282b30; }
  .phase-num { font-family:'DM Mono',monospace; font-size:11px; color:#555; min-width:28px; }
  .phase-name {
    font-family:'Barlow Condensed',sans-serif;
    font-size:16px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.06em;
    flex:1;
    color:#3a3d42;
  }
  .phase-header.has-content .phase-name { color:#fff; }
  .phase-badge { font-family:'DM Mono',monospace; font-size:10px; color:#555; }
  .phase-header.has-content .phase-badge { color:var(--rot); }
  .chevron { font-size:11px; color:#aaa; transition:transform .2s; }
  .phase-header.open .chevron { transform:rotate(90deg); }
  .phase-body {
    display:none;
    flex-direction:column;
    gap:3px;
    padding:4px 0;
    border-left:4px solid var(--linie);
    border-radius:0 0 6px 6px;
    background:#1e2024;
    margin-top:2px;
  }
  .phase-body.open { display:flex; }

  .step-card {
    margin:0 8px;
    border-radius:5px;
    padding:10px 14px;
    border-left:3px solid transparent;
    display:flex;
    align-items:flex-start;
    gap:12px;
  }
  .card-gf { background:#1b2b20; border-color:var(--gruen); }
  .card-at { background:#2a1a1a; border-color:var(--rot); }
  .card-wt { background:#1a2331; border-color:var(--blau); }
  .card-st { background:#2a2218; border-color:var(--gelb); }
  .card-ma { background:#22222a; border-color:var(--lila); }
  .card-me { background:#1e2828; border-color:var(--tuerkis); }
  .rolle-tag {
    font-family:'Barlow Condensed',sans-serif;
    font-size:11px;
    font-weight:700;
    letter-spacing:.08em;
    text-transform:uppercase;
    padding:2px 8px;
    border-radius:3px;
    flex-shrink:0;
    margin-top:1px;
    color:#fff;
  }
  .tag-gf { background:var(--gruen); }
  .tag-at { background:var(--rot); }
  .tag-wt { background:var(--blau); }
  .tag-st { background:var(--gelb); color:#222; }
  .tag-ma { background:var(--lila); }
  .tag-me { background:var(--tuerkis); }
  .step-text { font-size:13px; color:#d0d4de; line-height:1.6; }
  .step-text strong { color:#fff; }
  .cmd {
    font-family:'DM Mono',monospace;
    font-size:11.5px;
    color:#f0c060;
    background:rgba(255,255,255,.05);
    padding:2px 6px;
    border-radius:3px;
    display:inline-block;
    margin-top:2px;
    white-space:pre-line;
  }
  .cond {
    font-family:'DM Mono',monospace;
    font-size:11px;
    color:#e74c3c;
    background:rgba(231,76,60,.08);
    padding:4px 8px;
    border-radius:3px;
    display:block;
    margin-top:4px;
    border-left:2px solid #e74c3c;
  }
  .hint-text {
    font-family:'DM Mono',monospace;
    font-size:11px;
    color:#c8a060;
    padding:8px 14px;
    margin:2px 8px 0;
    background:rgba(230,126,34,.08);
    border-left:3px solid var(--orange);
    border-radius:4px;
  }
  .footer {
    text-align:center;
    padding:20px;
    font-family:'DM Mono',monospace;
    font-size:10px;
    color:#333;
    letter-spacing:.06em;
  }
  .seq-num {
    font-family:'DM Mono',monospace;
    font-size:10px;
    color:#555;
    background:rgba(255,255,255,.06);
    border-radius:3px;
    padding:1px 5px;
    margin-right:4px;
    flex-shrink:0;
  }
  ol.seq {
    list-style:none;
    padding:0;
    margin:4px 0 0;
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  ol.seq li {
    display:flex;
    align-items:flex-start;
    gap:6px;
    font-size:12.5px;
    color:#c8ccd8;
  }
  ol.seq li strong { color:#fff; }

  @media (max-width: 640px) {
    .start-title { font-size:42px; }
    .role-grid { grid-template-columns:repeat(2,1fr); }
    .topbar { flex-wrap:wrap; align-items:flex-start; }
    .topbar-title { width:100%; order:3; font-size:16px; }
    .topbar-right { display:none; }
  }
</style>
</head>
<body>

<div id="start-screen">
  <div class="start-badge">Leistungsprüfung · FwDV 3 · Bayern</div>
  <div class="start-title">Wasseraufbau<br><span>Variante III</span></div>
  <div class="start-sub">Innenangriff – Wasserentnahme aus Hydranten · Stufe 2–6</div>
  <div class="hero-bar"></div>

  <div class="start-question">Wer bist du?</div>
  <div class="role-grid">
    <button class="role-btn btn-gf" onclick="selectRole('gf')"><span class="icon">⭐</span><span class="name">Gruppenführer</span><span class="sub">GF</span></button>
    <button class="role-btn btn-at" onclick="selectRole('at')"><span class="icon">🔴</span><span class="name">Angriffstrupp</span><span class="sub">ATF · ATM</span></button>
    <button class="role-btn btn-wt" onclick="selectRole('wt')"><span class="icon">💧</span><span class="name">Wassertrupp</span><span class="sub">WTF · WTM</span></button>
    <button class="role-btn btn-st" onclick="selectRole('st')"><span class="icon">🚧</span><span class="name">Schlauchtrupp</span><span class="sub">STF · STM</span></button>
    <button class="role-btn btn-ma" onclick="selectRole('ma')"><span class="icon">⚙️</span><span class="name">Maschinist</span><span class="sub">Ma</span></button>
    <button class="role-btn btn-me" onclick="selectRole('me')"><span class="icon">📡</span><span class="name">Melder</span><span class="sub">Me</span></button>
    <button class="role-all-btn" onclick="selectRole('all')">👁 Alle Funktionen anzeigen</button>
  </div>
</div>

<div id="main-screen">
  <div class="topbar">
    <div class="topbar-left">
      <button class="back-btn" onclick="goBack()">← Zurück</button>
      <span class="current-role-tag" id="role-tag"></span>
    </div>
    <div class="topbar-title">Variante III · Aufbau mit Tank</div>
    <div class="topbar-right" id="topbar-info"></div>
  </div>
  <div class="content" id="content"></div>
  <div class="footer">Variante III · nur Aufbau · Schnellangriffsverteiler · LF mit Wassertank</div>
</div>

<script>
const ROLES = {
  gf:{label:'Gruppenführer',short:'GF',color:'#1e8449',tagClass:'tag-gf',cardClass:'card-gf'},
  at:{label:'Angriffstrupp',short:'AT',color:'#C0392B',tagClass:'tag-at',cardClass:'card-at'},
  wt:{label:'Wassertrupp',short:'WT',color:'#2471a3',tagClass:'tag-wt',cardClass:'card-wt'},
  st:{label:'Schlauchtrupp',short:'ST',color:'#f1c40f',tagClass:'tag-st',cardClass:'card-st'},
  ma:{label:'Maschinist',short:'Ma',color:'#8e44ad',tagClass:'tag-ma',cardClass:'card-ma'},
  me:{label:'Melder',short:'Me',color:'#16a085',tagClass:'tag-me',cardClass:'card-me'}
};

const PHASES = [
  {
    num:'01', name:'Ausgangsstellung',
    steps:[
      { role:'at', text:`
        <ol class="seq">
          <li><span class="seq-num">1</span>AT tritt bereits mit <strong>aufgenommenem Atemschutzgerät</strong> und ergänzender Schutzausrüstung an.</li>
          
        </ol>` }
    ]
  },
  {
    num:'02', name:'Lagemeldung & erster Einsatzbefehl',
    steps:[
      { role:'gf', text:`
        <ol class="seq">
          <li><span class="seq-num">1</span>Gibt Lageschilderung und Einsatzbefehl.</li>
          <li><span class="seq-num">2</span>Erkundet weiter.</li>
          <li><span class="seq-num">3</span>Führt, wenn nicht anders befohlen, die <strong>Atemschutzüberwachung</strong> durch.</li>
        </ol>
        <span class="cmd">„Zimmerbrand im Erdgeschoss,
keine Menschen und Tiere in Gefahr
Wasserentnahmestelle der …hydrant
Lage des Verteilers …”</span>
        <span class="cmd">„Schlauchtrupp
zur Absicherung der Einsatzstelle
mit Warndreiecken und Warnleuchten
je 30 m vor dem Löschfahrzeug und dem …hydrant”</span>
        <span class="cmd">„Zum Einsatz fertig!”</span>` },
      { role:'st', text:`Rüstet sich zur <strong>Verkehrsabsicherung</strong> mit Warndreiecken und Warnleuchten aus.` },
      { role:'me', text:`Geht zum <strong>Gruppenführer</strong> und arbeitet auf dessen Weisung.` }
    ]
  },
  {
    num:'03', name:'Maschinist – Fahrzeug & Pumpe',
    steps:[
      { role:'ma', text:`
        <ol class="seq">
          <li><span class="seq-num">1</span>Startet den <strong>Motor</strong> vom Fahrersitz.</li>
          <li><span class="seq-num">2</span>Sichert das LF mit <strong>Warnblinkanlage, Fahrlicht und blauem Blinklicht</strong>, ggf. Heckwarnsystem und Umfeldbeleuchtung.</li>
          <li><span class="seq-num">3</span>Nimmt Blindkupplungen der Druckabgänge ab, soweit erforderlich.</li>
          <li><span class="seq-num">4</span>Kuppelt die Leitung zum <strong>Schnellangriffsverteiler</strong> an die Pumpe.</li>
          <li><span class="seq-num">5</span>Nimmt die <strong>Feuerlöschkreiselpumpe</strong> in Betrieb.</li>
          <li><span class="seq-num">6</span>Achtet auf maximal <strong>8 bar</strong>.</li>
        </ol>` }
    ]
  },
  {
    num:'04', name:'Angriffstrupp – ausrüsten & Verteiler setzen',
    steps:[
      { role:'at', text:`
        <ol class="seq">
          <li><span class="seq-num">1</span>ATF wiederholt: <span class="cmd">„Zum Einsatz fertig!”</span></li>
          <li><span class="seq-num">2</span>Rüstet sich aus mit <strong>Beleuchtungsgerät, Strahlrohr, Feuerwehraxt oder Hebelwerkzeug und mindestens zwei C-Schläuchen</strong>.</li>
          <li><span class="seq-num">3</span>Lässt sich bei der <strong>Atemschutzüberwachung</strong> registrieren.</li>
          <li><span class="seq-num">4</span>Setzt den <strong>Schnellangriffsverteiler</strong>.</li>
          <li><span class="seq-num">5</span>Meldet an den Maschinisten: <span class="cmd">„Wasser marsch!”</span></li>
          <li><span class="seq-num">6</span>Meldet dem Gruppenführer: <span class="cmd">„Angriffstrupp einsatzbereit!”</span></li>
        </ol>` }
    ]
  },
  {
    num:'05', name:'GF-Befehl 1. Rohr',
    steps:[
      { role:'gf', text:`Gibt sofort nach Meldung <strong>„Angriffstrupp einsatzbereit!”</strong> den Befehl:<br>
        <span class="cmd">„Angriffstrupp
zum Umspritzen des linken Eimers
1. Rohr
zur linken markierten Linie
über den Platz
vor!”</span>` },
      { role:'at', text:`
        <ol class="seq">
          <li><span class="seq-num">1</span>ATF wiederholt den Befehl.</li>
          <li><span class="seq-num">2</span>ATF meldet per Funk die <strong>Fülldrücke</strong> beider Truppmitglieder.</li>
          <li><span class="seq-num">3</span>Kuppelt die <strong>C-Leitung links</strong> am Verteiler an.</li>
          <li><span class="seq-num">4</span>Verlegt die C-Leitung in <strong>Buchten</strong>.</li>
          <li><span class="seq-num">5</span>Kuppelt das <strong>Strahlrohr</strong> an.</li>
          <li><span class="seq-num">6</span>ATF kommandiert: <span class="cmd">„1. Rohr Wasser marsch!”</span></li>
        </ol>
        <span class="cond">⚠ Der Angriffstrupp wartet ab hier auf die tatsächliche Freigabe des 1. Rohres.</span>` }
    ]
  },
  {
    num:'06', name:'Wassertrupp – Hydrant & Sicherheitstrupp',
    hint:'Nur Aufbau mit Tank: WT braucht nur 1x B zum Hydranten. Hydrant wird mit Kugelhahn gespült, Systemtrenner wird eingebaut.',
    steps:[
      { role:'wt', text:`
        <ol class="seq">
          <li><span class="seq-num">1</span>Verlegt <strong>eine B-Leitung</strong> vom Fahrzeug zum Hydranten.</li>
          <li><span class="seq-num">2</span>Spült den <strong>Hydranten mit Kugelhahn</strong>.</li>
          <li><span class="seq-num">3</span>Baut den <strong>Systemtrenner</strong> ein.</li>
          <li><span class="seq-num">4</span>Nimmt den Hydranten in Betrieb.</li>
          <li><span class="seq-num">5</span>Rüstet sich als <strong>Sicherheitstrupp</strong> nach FwDV 7 aus.</li>
          <li><span class="seq-num">6</span>Lässt sich bei der Atemschutzüberwachung registrieren.</li>
          <li><span class="seq-num">7</span>Legt die Geräte am Verteiler ab.</li>
          <li><span class="seq-num">8</span>Kuppelt den <strong>C-Schlauch rechts</strong> am Verteiler an.</li>
          <li><span class="seq-num">9</span>Stellt sich am Verteiler als <strong>Sicherheitstrupp</strong> bereit.</li>
          <li><span class="seq-num">10</span>WTF meldet dem GF: <span class="cmd">„Wassertrupp als Sicherheitstrupp einsatzbereit!”</span></li>
        </ol>` }
    ]
  },
  {
    num:'07', name:'Schlauchtrupp – Absicherung & Freigabe',
    steps:[
      { role:'st', text:`
        <ol class="seq">
          <li><span class="seq-num">1</span>Stellt Warndreiecke und Warnleuchten auf: <strong>30 m vom LF</strong> und <strong>30 m vom Hydranten</strong>.</li>
          <li><span class="seq-num">2</span>Stellt sich am <strong>Verteiler</strong> bereit.</li>
          <li><span class="seq-num">3</span>STF meldet dem GF: <span class="cmd">„Schlauchtrupp einsatzbereit!”</span></li>
          <li><span class="seq-num">4</span>STF bedient den Verteiler.</li>
          <li><span class="seq-num">5</span>STM übernimmt die <strong>Schlauchaufsicht</strong>.</li>
        </ol>
        <span class="cond">⚠ STF öffnet das 1. Rohr erst, wenn der WT als Sicherheitstrupp bereit und gemeldet ist.</span>` }
    ]
  },
  {
    num:'08', name:'Angriffstrupp geht jetzt vor',
    hint:'Harte Ablauftrennung: AT darf erst vorgehen, nachdem WT als Sicherheitstrupp bereit und gemeldet ist – weil erst dann der ST das 1. Rohr öffnet.',
    steps:[
      { role:'at', text:`
        <ol class="seq">
          <li><span class="seq-num">1</span>Nach Öffnung des 1. Rohres meldet ATF per Funk: <span class="cmd">„Lungenautomat angeschlossen!”</span></li>
          <li><span class="seq-num">2</span>Erst jetzt übertritt der AT die markierte Linie (<strong>max. 1 m</strong>).</li>
          <li><span class="seq-num">3</span>ATF meldet dem GF: <span class="cmd">„Einsatzort erreicht!”</span></li>
          <li><span class="seq-num">4</span>Umspritzt den <strong>linken Eimer</strong>.</li>
          <li><span class="seq-num">5</span>Schließt das Strahlrohr sofort danach.</li>
          <li><span class="seq-num">6</span>ATF meldet dem GF: <span class="cmd">„Angriffstrupp Befehl ausgeführt!”</span></li>
        </ol>` },
      { role:'gf', text:`Gibt die weiteren Befehle erst nach dieser Freigabe- und Vorgehenslogik.` }
    ]
  },
  {
    num:'09', name:'Befehl an den Schlauchtrupp – 3. Rohr',
    steps:[
      { role:'gf', text:`Gibt sofort nachdem das 1. Rohr geöffnet wurde den Befehl:<br>
        <span class="cmd">„Schlauchtrupp
zum Umspritzen des rechten Eimers
3. Rohr
zur rechten markierten Linie
über den Platz
vor!”</span><br>
        Danach: <span class="cmd">„Melder bedient den Verteiler!”</span>` },
      { role:'me', text:`Wiederholt den Befehl, bedient den <strong>Verteiler</strong> und übernimmt die <strong>Schlauchaufsicht</strong>.` },
      { role:'st', text:`
        <ol class="seq">
          <li><span class="seq-num">1</span>STF wiederholt den Befehl:<br><span class="cmd">„Schlauchtrupp
zum Umspritzen des rechten Eimers
3. Rohr
zur rechten markierten Linie
über den Platz
vor!”</span></li>
          <li><span class="seq-num">2</span>Rüstet sich mit <strong>Beleuchtungsgerät, Strahlrohr und mindestens zwei C-Schläuchen</strong> aus.</li>
          <li><span class="seq-num">3</span>Kuppelt die <strong>C-Leitung mittig</strong> am Verteiler an.</li>
          <li><span class="seq-num">4</span>Verlegt die C-Leitung in <strong>Buchten</strong>.</li>
          <li><span class="seq-num">5</span>Kuppelt das Strahlrohr an.</li>
          <li><span class="seq-num">6</span>STF kommandiert: <span class="cmd">„3. Rohr Wasser marsch!”</span></li>
          <li><span class="seq-num">7</span>Umspritzt den <strong>rechten Eimer</strong> und schließt danach sofort das Strahlrohr.</li>
          <li><span class="seq-num">8</span>STF meldet dem GF: <span class="cmd">„Schlauchtrupp Befehl ausgeführt!”</span></li>
        </ol>` }
    ]
  }
];

let currentRole = null;

function selectRole(role) {
  currentRole = role;
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'flex';

  const tag = document.getElementById('role-tag');
  if (role === 'all') {
    tag.textContent = 'Alle Funktionen';
    tag.style.background = '#444';
  } else {
    const r = ROLES[role];
    tag.textContent = r.label;
    tag.style.background = r.color;
  }

  document.getElementById('topbar-info').innerHTML = role === 'all' ? 'Gesamter Ablauf<br>sichtbar' : 'Nur deine Schritte<br>sichtbar';
  renderContent();
}

function goBack() {
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('start-screen').style.display = 'flex';
  currentRole = null;
}

function renderContent() {
  const container = document.getElementById('content');
  container.innerHTML = '';

  PHASES.forEach(phase => {
    const mySteps = currentRole === 'all' ? phase.steps : phase.steps.filter(s => s.role === currentRole);
    const hasContent = mySteps.length > 0;

    const phaseEl = document.createElement('div');
    phaseEl.className = 'phase';

    const header = document.createElement('div');
    header.className = 'phase-header' + (hasContent ? ' has-content open' : '');
    header.innerHTML = `
      <span class="phase-num">${phase.num}</span>
      <span class="phase-name">${phase.name}</span>
      ${hasContent
        ? `<span class="phase-badge">${mySteps.length} Schritt${mySteps.length !== 1 ? 'e' : ''}</span><span class="chevron">▶</span>`
        : `<span class="phase-badge">–</span>`}
    `;

    const body = document.createElement('div');
    body.className = 'phase-body' + (hasContent ? ' open' : '');

    if (hasContent) {
      if (phase.hint) {
        const h = document.createElement('div');
        h.className = 'hint-text';
        h.innerHTML = phase.hint;
        body.appendChild(h);
      }

      const toShow = currentRole === 'all' ? phase.steps : mySteps;
      toShow.forEach(step => {
        const r = ROLES[step.role];
        const card = document.createElement('div');
        card.className = `step-card ${r.cardClass}`;
        card.innerHTML = `<span class="rolle-tag ${r.tagClass}">${r.short}</span><div class="step-text">${step.text}</div>`;
        body.appendChild(card);
      });

      header.addEventListener('click', () => {
        header.classList.toggle('open');
        body.classList.toggle('open');
      });
    }

    phaseEl.appendChild(header);
    phaseEl.appendChild(body);
    container.appendChild(phaseEl);
  });
}
</script>
